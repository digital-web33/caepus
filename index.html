<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caepus — Restaurant Traiteur Neuilly-sur-Seine</title>
    <meta name="description" content="Caepus, restaurant et traiteur familial à Neuilly-sur-Seine depuis 1989. Cuisine fraîche, fait maison, de mère en fille." />
    <meta name="author" content="Caepus" />

    <meta property="og:title" content="Caepus — Restaurant Traiteur Neuilly-sur-Seine" />
    <meta property="og:description" content="Cuisine familiale, fraîche et passionnée. De mère en fille depuis 1989." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Netlify Identity Widget (nécessaire pour Decap CMS) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Redirect après login Netlify Identity -->
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function(user) {
          if (!user) {
            window.netlifyIdentity.on("login", function() {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
